info:
  description: AI服务
server:
  port: 9988
  tomcat:
    uri-encoding: UTF-8
    # 连接数满后的排队数，默认为100
    accept-count: 1000
    threads:
      # tomcat最大线程数，默认为200
      max: 800
      # Tomcat启动初始化的线程数，默认值10
      min-spare: 100
logging:
  level:
    root: INFO
    com.zhaopx.ai: DEBUG
  file:
    path: logs
spring:
  elasticsearch:
    uris: http://182.92.236.254:19200
    username: elastic
    password: ElasticSearch_Zhaopx
  ai:
    # 明确启用 Dashscope chat model（避免不同版本自动配置差异）
    model:
      chat: dashscope
    dashscope:
      api-key: 'sk-209d07b636164a9cba5a1e040256c137'
      # chat 模型需要单独配置可用的 model 名称；不同账号对不同模型权限不同
      chat:
        api-key: 'sk-209d07b636164a9cba5a1e040256c137'
        options:
          model: qwen-turbo
      embedding:
        options:
          model: text-embedding-v3
    vectorstore:
      elasticsearch:
        initialize-schema: true
        # 与 Dashscope text-embedding-v3 的实际输出维度对齐（否则写入会报 dense_vector 维度不匹配）
        index-name: custom-index-1024
        dimensions: 1024
        similarity: cosine

# Dashscope embedding 单次请求限制（<=10）
document:
  chunk:
    size: 500
  embedding:
    batch-size: 10
search:
  hybrid:
    top-k: 5
    num-candidates: 30
    rank-constant: 60
    rank-window-size: 100
