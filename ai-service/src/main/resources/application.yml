info:
  description: AI服务
server:
  port: 9988
  tomcat:
    uri-encoding: UTF-8
    # 连接数满后的排队数，默认为100
    accept-count: 1000
    threads:
      # tomcat最大线程数，默认为200
      max: 800
      # Tomcat启动初始化的线程数，默认值10
      min-spare: 100
logging:
  level:
    root: INFO
    com.zhaopx.ai: DEBUG
  file:
    path: logs
spring:
  elasticsearch:
    uris: http://182.92.236.254:19200
    username: elastic
    password: ElasticSearch_Zhaopx
  ai:
    dashscope:
      api-key: 'sk-209d07b636164a9cba5a1e040256c137'
      embedding:
        options:
          model: text-embedding-v3
    vectorstore:
      elasticsearch:
        initialize-schema: true
        index-name: custom-index
        dimensions: 1536
        similarity: cosine
